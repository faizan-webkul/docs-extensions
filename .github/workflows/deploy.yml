name: Build and deploy docs

# ---------------------------------------------------------------------------
# Project list
#
# To add a new project:
#   1. Add a checkout step in the "Pull project docs" section below
#      (copy an existing block, swap repo + path).
#   2. Add a copy step in the "Stage project docs" section.
#   3. Add nav + sidebar entries in docs/.vitepress/config.ts.
#   4. Add docs/{slug}/index.md + sidebar.json placeholders.
#
# Project slug = folder name under docs/ and URL prefix.
# Project repo = GitHub repo containing a top-level docs/ folder.
#
# Current projects:
#   shopify                 → unopim/unopim-shopify
#   magento2                → unopim/unopim-magento2
#   odoo-erp                → unopim/unopim-odoo-erp
#   erpnext                 → unopim/unopim-erpnext-connector
#   bigcommerce             → unopim/unopim-bigcommerce
#   shopware6               → unopim/unopim-shopware6
#   woocommerce             → unopim/unopim-woocommerce
#   bagisto                 → unopim/unopim-bagisto
#   cs-cart                 → unopim/unopim-cs-cart
#   prestashop              → unopim/unopim-prestashop
#   icecat                  → unopim/unopim-icecat
#   xml-connector           → unopim/unopim-xml-connector
#   aws-integration         → unopim/unopim-aws-integration
#   ai-product-feed-openai  → unopim/unopim-ai-product-feed-openai
#   job-scheduler           → unopim/unopim-job-scheduler
#   supplier-data-portal    → unopim/unopim-supplier-data-portal
#   public-image-url        → unopim/unopim-public-image-url
#   maker-checker-workflow  → unopim/unopim-maker-checker-workflow
#   pdf-generator           → unopim/unopim-pdf-generator
#   dam                     → unopim/unopim-dam
#   starter-pack            → unopim/unopim-starter-pack
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [docs-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # Pull project docs (sparse checkout of docs/ folder only).
      # continue-on-error so a missing/private repo doesn't break the build —
      # the placeholder docs/{slug}/index.md will be used instead.
      # -------------------------------------------------------------------

      - name: Pull shopify docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-shopify
          path: tmp/shopify
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull magento2 docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-magento2
          path: tmp/magento2
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull odoo-erp docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-odoo-erp
          path: tmp/odoo-erp
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull erpnext docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-erpnext-connector
          path: tmp/erpnext
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull bigcommerce docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-bigcommerce
          path: tmp/bigcommerce
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull shopware6 docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-shopware6
          path: tmp/shopware6
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull woocommerce docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-woocommerce
          path: tmp/woocommerce
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull bagisto docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-bagisto
          path: tmp/bagisto
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull cs-cart docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-cs-cart
          path: tmp/cs-cart
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull prestashop docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-prestashop
          path: tmp/prestashop
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull icecat docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-icecat
          path: tmp/icecat
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull xml-connector docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-xml-connector
          path: tmp/xml-connector
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull aws-integration docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-aws-integration
          path: tmp/aws-integration
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull ai-product-feed-openai docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-ai-product-feed-openai
          path: tmp/ai-product-feed-openai
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull job-scheduler docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-job-scheduler
          path: tmp/job-scheduler
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull supplier-data-portal docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-supplier-data-portal
          path: tmp/supplier-data-portal
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull public-image-url docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-public-image-url
          path: tmp/public-image-url
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull maker-checker-workflow docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-maker-checker-workflow
          path: tmp/maker-checker-workflow
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull pdf-generator docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-pdf-generator
          path: tmp/pdf-generator
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull dam docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-dam
          path: tmp/dam
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Pull starter-pack docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: unopim/unopim-starter-pack
          path: tmp/starter-pack
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      # -------------------------------------------------------------------
      # Stage project docs into docs/{slug}/.
      # If source repo had no docs/, the placeholder index.md is preserved.
      # -------------------------------------------------------------------
      - name: Stage project docs
        run: |
          set -e
          for slug in \
              shopify magento2 odoo-erp erpnext bigcommerce \
              shopware6 woocommerce bagisto cs-cart prestashop icecat \
              xml-connector aws-integration ai-product-feed-openai \
              job-scheduler supplier-data-portal public-image-url \
              maker-checker-workflow pdf-generator dam starter-pack; do
            src="tmp/${slug}/docs"
            dst="docs/${slug}"
            if [ -d "$src" ] && [ -n "$(ls -A "$src" 2>/dev/null)" ]; then
              echo "Staging $slug from $src"
              cp -R "$src"/. "$dst"/
            else
              echo "No docs found for $slug — keeping placeholder"
            fi
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run docs:build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
